<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1E40AF">
    <title>Finance Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #1E40AF;
            --primary-light: #3B82F6;
            --income: #10B981;
            --expense: #EF4444;
            --transfer: #8B5CF6;
            --bg: #F1F5F9;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --nav-height: 65px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── LOGIN ── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            color: white;
            padding: 24px;
        }
        .login-logo { font-size: 56px; margin-bottom: 16px; }
        .login-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; }
        .login-subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 52px; text-align: center; line-height: 1.5; }
        .sign-in-btn {
            display: flex; align-items: center; gap: 12px;
            background: white; color: #1E293B; border: none;
            border-radius: 14px; padding: 15px 28px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
        }

        /* ── APP SHELL ── */
        #app { display: none; flex-direction: column; height: 100dvh; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            color: white; padding: 14px 20px 16px; flex-shrink: 0;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-subtitle { font-size: 12px; opacity: 0.75; margin-top: 2px; }
        .avatar-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.2); border: none;
            color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── MONTH SELECTOR ── */
        .month-selector {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 10px 20px;
            background: var(--card); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .month-btn {
            background: none; border: none; font-size: 22px;
            cursor: pointer; color: var(--primary); padding: 4px 10px;
            border-radius: 8px;
        }
        .month-btn:active { background: #EFF6FF; }
        .month-label { font-size: 15px; font-weight: 700; min-width: 130px; text-align: center; }

        /* ── CONTENT ── */
        .content { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-height) + 8px); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 3px; background: none; border: none; cursor: pointer;
            padding: 6px 16px; color: var(--text-secondary);
            font-size: 10px; font-weight: 500; flex: 1;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
        .nav-add {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            font-size: 30px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(30,64,175,0.45);
            margin-top: -22px; flex-shrink: 0;
        }
        .nav-add:active { opacity: 0.85; }

        /* ── CARDS ── */
        .card {
            background: var(--card); border-radius: 16px;
            padding: 16px; margin: 12px 16px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        /* ── NET CARD ── */
        .net-card {
            margin: 12px 16px 0;
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            border-radius: 16px; padding: 18px; color: white;
        }
        .net-label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .net-amount { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }
        .net-sub { font-size: 12px; opacity: 0.7; margin-top: 4px; }

        /* ── SUMMARY GRID ── */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 16px 0; }
        .summary-card { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .summary-icon { font-size: 22px; margin-bottom: 8px; }
        .summary-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .summary-amount { font-size: 19px; font-weight: 800; }
        .summary-amount.income { color: var(--income); }
        .summary-amount.expense { color: var(--expense); }

        /* ── TRANSACTION ITEM ── */
        .transaction-item {
            display: flex; align-items: center;
            padding: 11px 0; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .transaction-item:last-child { border-bottom: none; }
        .tx-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .tx-icon.income { background: #D1FAE5; }
        .tx-icon.expense { background: #FEE2E2; }
        .tx-icon.transfer { background: #EDE9FE; }
        .tx-info { flex: 1; min-width: 0; }
        .tx-category { font-size: 14px; font-weight: 600; }
        .tx-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tx-right { text-align: right; flex-shrink: 0; }
        .tx-amount { font-size: 14px; font-weight: 700; }
        .tx-amount.income { color: var(--income); }
        .tx-amount.expense { color: var(--expense); }
        .tx-amount.transfer { color: var(--transfer); }
        .tx-date { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        /* ── CHART ── */
        .chart-container { position: relative; height: 190px; margin: 4px 0 8px; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
        .legend-left { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .legend-name { font-size: 13px; }
        .legend-pct { font-size: 11px; color: var(--text-secondary); }
        .legend-amount { font-size: 13px; font-weight: 700; color: var(--expense); }

        /* ── ACCOUNT ITEM ── */
        .account-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .account-item:last-child { border-bottom: none; }
        .account-name { font-size: 14px; font-weight: 600; }
        .account-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .account-balance { font-size: 16px; font-weight: 800; }

        /* ── FORM ── */
        .form-section { padding: 16px; }
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; display: block; }
        .form-input, .form-select {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 15px; color: var(--text); background: var(--card);
            outline: none; transition: border-color 0.2s;
            -webkit-appearance: none; appearance: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary-light); }
        .form-select-wrap { position: relative; }
        .form-select-wrap::after {
            content: '›'; position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%) rotate(90deg);
            color: var(--text-secondary); font-size: 18px; pointer-events: none;
        }

        /* ── TYPE SELECTOR ── */
        .type-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .type-btn {
            padding: 10px 4px; border: 1.5px solid var(--border);
            border-radius: 10px; background: none; font-size: 11px;
            font-weight: 700; cursor: pointer; text-align: center; color: var(--text-secondary);
        }
        .type-btn.active-expense  { border-color: var(--expense); background: #FEE2E2; color: var(--expense); }
        .type-btn.active-income   { border-color: var(--income);  background: #D1FAE5; color: var(--income);  }
        .type-btn.active-transfer { border-color: var(--transfer);background: #EDE9FE; color: var(--transfer);}

        /* ── SUBMIT ── */
        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary);
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:active { opacity: 0.88; }
        .submit-btn:disabled { opacity: 0.6; }

        /* ── RECORDS ── */
        .records-filter { padding: 0 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .records-filter::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
            background: none; font-size: 13px; font-weight: 500; cursor: pointer;
            white-space: nowrap; color: var(--text-secondary);
        }
        .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
        .search-box { margin: 0 16px 10px; position: relative; }
        .search-input {
            width: 100%; padding: 10px 16px 10px 38px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 14px; background: var(--card); outline: none;
        }
        .search-input:focus { border-color: var(--primary-light); }
        .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; }

        /* ── SETTINGS ── */
        .settings-section { margin: 0 16px 16px; }
        .settings-section-title { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; padding: 16px 0 8px; }
        .settings-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .settings-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-label { font-size: 15px; font-weight: 500; }
        .settings-value { font-size: 14px; color: var(--text-secondary); }

        /* ── MISC ── */
        .view-header { padding: 16px 16px 4px; font-size: 22px; font-weight: 800; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 44px; margin-bottom: 10px; }
        .danger-btn {
            width: calc(100% - 32px); margin: 8px 16px 24px;
            padding: 14px; background: #FEE2E2; color: var(--expense);
            border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .see-all-btn {
            width: 100%; padding: 10px; background: none; border: none;
            color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: calc(var(--nav-height) + 12px);
            left: 16px; right: 16px; padding: 13px 20px;
            background: #1E293B; color: white; border-radius: 12px;
            font-size: 14px; font-weight: 500; z-index: 500; text-align: center;
            transform: translateY(120px); transition: transform 0.28s ease;
        }
        .toast.show { transform: translateY(0); }

        /* ── SPINNER ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite; display: inline-block;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════ LOGIN ══ -->
<div id="login-screen">
    <div class="login-logo">💰</div>
    <div class="login-title">Finance Tracker</div>
    <div class="login-subtitle">Track your income &amp; expenses<br>synced with Google Sheets</div>
    <button class="sign-in-btn" onclick="signIn()">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
    </button>
</div>

<!-- ════════════════════════════════════════ APP ════ -->
<div id="app">
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title" id="header-title">Dashboard</div>
                <div class="header-subtitle" id="header-subtitle">Finance Tracker</div>
            </div>
            <button class="avatar-btn" onclick="navigate('settings')">👤</button>
        </div>
    </div>

    <div class="month-selector" id="month-selector">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="content" id="content"></div>

    <nav class="bottom-nav">
        <button class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
            <span class="nav-icon">🏠</span><span>Home</span>
        </button>
        <button class="nav-item" id="nav-records" onclick="navigate('records')">
            <span class="nav-icon">📋</span><span>Records</span>
        </button>
        <button class="nav-add" onclick="navigate('add')">+</button>
        <button class="nav-item" id="nav-accounts" onclick="navigate('accounts')">
            <span class="nav-icon">🏦</span><span>Accounts</span>
        </button>
        <button class="nav-item" id="nav-settings" onclick="navigate('settings')">
            <span class="nav-icon">⚙️</span><span>Settings</span>
        </button>
    </nav>
</div>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════ SCRIPT ═ -->
<script>
// ─── CONFIG ──────────────────────────────────────────
const CLIENT_ID = '395990245737-459842am2rilp1eeotcojocoq1q6o33i.apps.googleusercontent.com';
const SHEET_ID  = '1dbhN4OM8UIbu617Xe16833Uf0XxlkSpMcSox0ER-x7g';
const SCOPE     = 'https://www.googleapis.com/auth/spreadsheets';
const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CHART_COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#14B8A6'];

// ─── STATE ───────────────────────────────────────────
let accessToken  = null;
let tokenClient  = null;
let allData      = [];
let currentView  = 'dashboard';
let selectedMonth = new Date();
let categoryChart = null;
let recordsFilter = 'all';
let recordsSearch = '';

let settings = loadSettings();
function loadSettings() {
    try { return JSON.parse(localStorage.getItem('ft_settings')) || defaultSettings(); }
    catch(e) { return defaultSettings(); }
}
function defaultSettings() {
    return {
        sheetTab: 'Moneyger',
        accounts: ['BPI','MariBank','GCASH','CASH','Paymaya','PS Bank'],
        incomeCategories:  ['Custom Temporary Tattoos','Shopee Sales','Website Sales','Other Income'],
        expenseCategories: ['Labor','Utilities','Mark Expenses','Office Supplies','Advertising (FB Ads)','Dine out','Website and Technologies','Miscellaneous']
    };
}
function saveSettings() { localStorage.setItem('ft_settings', JSON.stringify(settings)); }

let form = resetForm();
function resetForm(keepAccount) {
    return {
        date: todayInput(), type: 'Exp.',
        account: keepAccount || '',
        category: '', subcategory: '', note: '', amount: '',
        transferAccount: ''
    };
}

// ─── AUTH ────────────────────────────────────────────
window.addEventListener('load', () => {
    updateMonthLabel();
    // If user has signed in before, try silent re-auth
    if (localStorage.getItem('ft_signed_in')) {
        waitForGoogleThenSilentSignIn();
    }
});

function waitForGoogleThenSilentSignIn(tries = 0) {
    if (window.google) { silentSignIn(); return; }
    if (tries < 20) setTimeout(() => waitForGoogleThenSilentSignIn(tries + 1), 300);
}

function silentSignIn() {
    initTokenClient('');
    tokenClient.requestAccessToken({ prompt: '' });
}

function signIn() {
    if (!window.google) { showToast('Google library not loaded yet. Try again.'); return; }
    initTokenClient('consent');
    tokenClient.requestAccessToken({ prompt: 'consent' });
}

function initTokenClient(prompt) {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPE,
        prompt: prompt,
        callback: (resp) => {
            if (resp.error) {
                // Silent failed — just show login screen (no toast)
                return;
            }
            accessToken = resp.access_token;
            localStorage.setItem('ft_signed_in', '1');
            showApp(); loadData();
        }
    });
}

function signOut() {
    if (accessToken) google.accounts.oauth2.revoke(accessToken, ()=>{});
    accessToken = null;
    localStorage.removeItem('ft_signed_in');
    allData = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
}

function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    navigate('dashboard');
}

// ─── API ─────────────────────────────────────────────
async function apiGet(range) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
    if (r.status === 401) { signIn(); throw new Error('Token expired'); }
    if (!r.ok) throw new Error('API error ' + r.status);
    return r.json();
}

async function apiAppend(range, values) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
    const r = await fetch(url, {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values })
    });
    if (r.status === 401) { signIn(); throw new Error('Token expired'); }
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'Save failed'); }
    return r.json();
}

async function loadData() {
    showContent('<div class="loading" style="padding:60px;text-align:center;color:var(--text-secondary)">Loading data…</div>');
    try {
        const data = await apiGet(`${settings.sheetTab}!A2:H`);
        allData = (data.values || []).map(r => ({
            period:          r[0] || '',
            account:         r[1] || '',
            category:        r[2] || '',
            subcategory:     r[3] || '',
            note:            r[4] || '',
            amount:          parseFloat(r[5]) || 0,
            type:            r[6] || '',
            transferAccount: r[7] || ''
        }));
        renderCurrentView();
    } catch(e) {
        if (e.message !== 'Token expired') showToast('Error loading data: ' + e.message);
    }
}

// ─── DATE HELPERS ─────────────────────────────────────
function parseSheetDate(str) {
    if (!str) return null;
    const p = str.split('-');
    if (p.length !== 3) return null;
    const mMap = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const d = parseInt(p[0]), m = mMap[p[1]];
    const y = p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]);
    if (isNaN(d) || m === undefined || isNaN(y)) return null;
    return new Date(y, m, d);
}
function toSheetDate(dateInputVal) {
    const d = new Date(dateInputVal + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}-${MONTHS[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}
function todayInput() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── DATA HELPERS ─────────────────────────────────────
function monthRows(data) {
    return data.filter(r => {
        const d = parseSheetDate(r.period);
        return d && d.getMonth() === selectedMonth.getMonth() && d.getFullYear() === selectedMonth.getFullYear();
    });
}
function monthStats() {
    const rows = monthRows(allData);
    let income = 0, expense = 0;
    rows.forEach(r => {
        if (r.type === 'Income') income += r.amount;
        else if (r.type === 'Exp.') expense += r.amount;
    });
    return { income, expense, net: income - expense, rows };
}
function accountBalances() {
    const bal = {};
    settings.accounts.forEach(a => bal[a] = 0);
    allData.forEach(r => {
        if (!r.account) return;
        if (!bal.hasOwnProperty(r.account)) bal[r.account] = 0;
        if (r.type === 'Income' || r.type === 'Transfer-In')  bal[r.account] += r.amount;
        if (r.type === 'Exp.'   || r.type === 'Transfer-Out') bal[r.account] -= r.amount;
    });
    return bal;
}
function categoryBreakdown() {
    const rows = monthRows(allData);
    const bd = {};
    rows.forEach(r => { if (r.type === 'Exp.' && r.category) bd[r.category] = (bd[r.category]||0) + r.amount; });
    return Object.entries(bd).sort((a,b) => b[1]-a[1]).slice(0,10);
}
function fmt(n) { return n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ─── NAVIGATION ───────────────────────────────────────
function navigate(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    const navIds = { dashboard:'nav-dashboard', records:'nav-records', accounts:'nav-accounts', settings:'nav-settings' };
    if (navIds[view]) document.getElementById(navIds[view]).classList.add('active');
    const showMonth = view === 'dashboard' || view === 'records';
    document.getElementById('month-selector').style.display = showMonth ? 'flex' : 'none';
    const titles = { dashboard:'Dashboard', records:'Records', add:'Add Transaction', accounts:'Accounts', settings:'Settings' };
    document.getElementById('header-title').textContent = titles[view] || view;
    renderCurrentView();
}
function showContent(html) { document.getElementById('content').innerHTML = html; }
function renderCurrentView() {
    if (currentView === 'dashboard') renderDashboard();
    else if (currentView === 'records') renderRecords();
    else if (currentView === 'add') renderAdd();
    else if (currentView === 'accounts') renderAccounts();
    else if (currentView === 'settings') renderSettings();
}

// ─── MONTH SELECTOR ───────────────────────────────────
function updateMonthLabel() {
    document.getElementById('month-label').textContent =
        selectedMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function changeMonth(dir) {
    selectedMonth = new Date(selectedMonth.getFullYear(), selectedMonth.getMonth() + dir, 1);
    updateMonthLabel();
    renderCurrentView();
}

// ─── DASHBOARD ────────────────────────────────────────
function renderDashboard() {
    const { income, expense, net, rows } = monthStats();
    const bd = categoryBreakdown();
    const recent = [...rows].reverse().slice(0, 5);

    showContent(`
        <div class="net-card">
            <div class="net-label">Net this month</div>
            <div class="net-amount" style="color:${net>=0?'#fff':'#FCA5A5'}">${net>=0?'+':''}₱${fmt(net)}</div>
            <div class="net-sub">${selectedMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-icon">💚</div>
                <div class="summary-label">Income</div>
                <div class="summary-amount income">₱${fmt(income)}</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">🔴</div>
                <div class="summary-label">Expenses</div>
                <div class="summary-amount expense">₱${fmt(expense)}</div>
            </div>
        </div>

        ${bd.length ? `
        <div class="card">
            <div class="card-title">Expenses by Category</div>
            <div class="chart-container"><canvas id="cat-chart"></canvas></div>
            <div>${bd.map(([cat,amt],i)=>`
                <div class="legend-item">
                    <div class="legend-left">
                        <div class="legend-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></div>
                        <span class="legend-name">${cat}</span>
                    </div>
                    <span class="legend-amount">₱${fmt(amt)}</span>
                </div>`).join('')}
            </div>
        </div>` : ''}

        <div class="card" style="margin-bottom:16px">
            <div class="card-title">Recent Transactions</div>
            ${recent.length ? recent.map(txHTML).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><div>No transactions this month</div></div>'}
            ${rows.length > 5 ? `<button class="see-all-btn" onclick="navigate('records')">View all ${rows.length} transactions →</button>` : ''}
        </div>
    `);

    if (bd.length) {
        setTimeout(() => {
            const el = document.getElementById('cat-chart');
            if (!el) return;
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(el, {
                type: 'doughnut',
                data: {
                    labels: bd.map(([c])=>c),
                    datasets: [{ data: bd.map(([,a])=>a), backgroundColor: CHART_COLORS, borderWidth: 2, borderColor: '#fff' }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '62%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ` ₱${fmt(ctx.parsed)}` } }
                    }
                }
            });
        }, 0);
    }
}

function txHTML(tx) {
    const isIncome   = tx.type === 'Income';
    const isTransfer = tx.type.includes('Transfer');
    const cls  = isIncome ? 'income' : isTransfer ? 'transfer' : 'expense';
    const icon = isIncome ? '💚' : isTransfer ? '🔄' : '🔴';
    const sign = isIncome ? '+' : isTransfer ? '' : '-';
    const label = tx.category || tx.type;
    const sub   = [tx.note, tx.account].filter(Boolean).join(' · ');
    return `
        <div class="transaction-item">
            <div class="tx-icon ${cls}">${icon}</div>
            <div class="tx-info">
                <div class="tx-category">${label}</div>
                <div class="tx-meta">${sub}</div>
            </div>
            <div class="tx-right">
                <div class="tx-amount ${cls}">${sign}₱${fmt(tx.amount)}</div>
                <div class="tx-date">${tx.period}</div>
            </div>
        </div>`;
}

// ─── RECORDS ──────────────────────────────────────────
function renderRecords() {
    let rows = monthRows(allData);
    if (recordsFilter === 'income')   rows = rows.filter(r => r.type === 'Income');
    if (recordsFilter === 'expense')  rows = rows.filter(r => r.type === 'Exp.');
    if (recordsFilter === 'transfer') rows = rows.filter(r => r.type.includes('Transfer'));
    if (recordsSearch) {
        const q = recordsSearch.toLowerCase();
        rows = rows.filter(r =>
            (r.category||'').toLowerCase().includes(q) ||
            (r.note||'').toLowerCase().includes(q) ||
            (r.account||'').toLowerCase().includes(q)
        );
    }
    rows = [...rows].reverse();

    showContent(`
        <div style="padding-top:12px">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input class="search-input" placeholder="Search…" value="${recordsSearch}"
                    oninput="recordsSearch=this.value;renderRecords()">
            </div>
            <div class="records-filter">
                ${['all','income','expense','transfer'].map(f=>`
                    <button class="filter-chip ${recordsFilter===f?'active':''}"
                        onclick="recordsFilter='${f}';renderRecords()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
            </div>
            <div class="card" style="margin-bottom:16px">
                ${rows.length ? rows.map(txHTML).join('') :
                  `<div class="empty-state"><div class="empty-icon">📭</div><div>No records found</div></div>`}
            </div>
        </div>`);
}

// ─── ADD FORM ─────────────────────────────────────────
function renderAdd() {
    const isTransfer = form.type === 'Transfer-In' || form.type === 'Transfer-Out';
    const cats = form.type === 'Income' ? settings.incomeCategories
               : form.type === 'Exp.'   ? settings.expenseCategories : [];

    const typeClass = (t) => {
        if (t === form.type) {
            if (t === 'Income') return 'active-income';
            if (t === 'Exp.')   return 'active-expense';
            return 'active-transfer';
        }
        return '';
    };

    showContent(`
        <div class="form-section">
            <div class="form-group">
                <label class="form-label">Type</label>
                <div class="type-selector">
                    ${[['Exp.','Expense'],['Income','Income'],['Transfer-In','Trans. In'],['Transfer-Out','Trans. Out']].map(([v,l])=>`
                        <button class="type-btn ${typeClass(v)}" onclick="setType('${v}')">${l}</button>`).join('')}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" class="form-input" value="${form.date}" onchange="form.date=this.value">
            </div>

            <div class="form-group">
                <label class="form-label">Account</label>
                <div class="form-select-wrap">
                    <select class="form-select" onchange="form.account=this.value">
                        <option value="">Select Account</option>
                        ${settings.accounts.map(a=>`<option value="${a}" ${form.account===a?'selected':''}>${a}</option>`).join('')}
                    </select>
                </div>
            </div>

            ${isTransfer ? `
            <div class="form-group">
                <label class="form-label">${form.type==='Transfer-In'?'From Account':'To Account'}</label>
                <div class="form-select-wrap">
                    <select class="form-select" onchange="form.transferAccount=this.value">
                        <option value="">Select Account</option>
                        ${settings.accounts.map(a=>`<option value="${a}" ${form.transferAccount===a?'selected':''}>${a}</option>`).join('')}
                    </select>
                </div>
            </div>` : `
            <div class="form-group">
                <label class="form-label">Category</label>
                <div class="form-select-wrap">
                    <select class="form-select" onchange="form.category=this.value">
                        <option value="">Select Category</option>
                        ${cats.map(c=>`<option value="${c}" ${form.category===c?'selected':''}>${c}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Subcategory <span style="font-weight:400">(optional)</span></label>
                <input type="text" class="form-input" placeholder="e.g. SPX Shipping"
                    value="${form.subcategory}" onchange="form.subcategory=this.value">
            </div>`}

            <div class="form-group">
                <label class="form-label">Note <span style="font-weight:400">(optional)</span></label>
                <input type="text" class="form-input" placeholder="Add a note…"
                    value="${form.note}" onchange="form.note=this.value">
            </div>

            <div class="form-group">
                <label class="form-label">Amount (₱)</label>
                <input type="number" class="form-input" placeholder="0.00"
                    value="${form.amount}" step="0.01" min="0" inputmode="decimal"
                    onchange="form.amount=this.value"
                    style="font-size:22px;font-weight:800">
            </div>

            <button class="submit-btn" id="save-btn" onclick="saveTransaction(this)">
                Save Transaction
            </button>
        </div>`);
}

function setType(t) { form.type = t; form.category = ''; renderAdd(); }

async function saveTransaction(btn) {
    const isTransfer = form.type === 'Transfer-In' || form.type === 'Transfer-Out';
    if (!form.account)                              { showToast('Please select an account'); return; }
    if (!form.amount || parseFloat(form.amount)<=0){ showToast('Please enter a valid amount'); return; }
    if (!isTransfer && !form.category)             { showToast('Please select a category'); return; }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Saving…';

    try {
        const row = [
            toSheetDate(form.date),
            form.account,
            isTransfer ? '' : form.category,
            isTransfer ? '' : form.subcategory,
            form.note,
            parseFloat(form.amount),
            form.type,
            isTransfer ? form.transferAccount : ''
        ];
        await apiAppend(`${settings.sheetTab}!A:H`, [row]);

        // Add to local cache
        allData.push({
            period: toSheetDate(form.date), account: form.account,
            category: isTransfer ? '' : form.category,
            subcategory: isTransfer ? '' : form.subcategory,
            note: form.note, amount: parseFloat(form.amount),
            type: form.type, transferAccount: isTransfer ? form.transferAccount : ''
        });

        const kept = form.account;
        form = resetForm(kept);
        showToast('✅ Saved!');
        navigate('dashboard');
    } catch(e) {
        showToast('Error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Save Transaction';
    }
}

// ─── ACCOUNTS ─────────────────────────────────────────
function renderAccounts() {
    const bal = accountBalances();
    const sorted = Object.entries(bal).sort((a,b) => b[1]-a[1]);
    const total = sorted.reduce((s,[,v])=>s+v, 0);

    showContent(`
        <div class="view-header">Account Balances</div>
        <div style="padding:0 16px 6px;font-size:13px;color:var(--text-secondary)">All-time running balance</div>
        <div class="card" style="margin-bottom:16px">
            ${sorted.map(([acc, b]) => `
                <div class="account-item">
                    <div>
                        <div class="account-name">${acc}</div>
                    </div>
                    <div class="account-balance" style="color:${b>=0?'var(--income)':'var(--expense)'}">
                        ${b<0?'-':''}₱${fmt(Math.abs(b))}
                    </div>
                </div>`).join('')}
            <div class="account-item" style="border-top:2px solid var(--border);margin-top:4px;padding-top:14px">
                <div class="account-name" style="font-size:15px">Total Net Worth</div>
                <div class="account-balance" style="font-size:18px;color:${total>=0?'var(--income)':'var(--expense)'}">
                    ${total<0?'-':''}₱${fmt(Math.abs(total))}
                </div>
            </div>
        </div>`);
}

// ─── SETTINGS ─────────────────────────────────────────
function renderSettings() {
    showContent(`
        <div class="settings-section">
            <div class="settings-section-title">Sheet</div>
            <div class="settings-card">
                <div class="settings-item" onclick="editSheetTab()">
                    <span class="settings-label">Tab Name</span>
                    <span class="settings-value">${settings.sheetTab} ›</span>
                </div>
            </div>

            <div class="settings-section-title">Accounts</div>
            <div class="settings-card">
                <div class="settings-item" onclick="editList('accounts','Accounts (one per line)')">
                    <span class="settings-label">Manage Accounts</span>
                    <span class="settings-value">${settings.accounts.length} ›</span>
                </div>
            </div>

            <div class="settings-section-title">Categories</div>
            <div class="settings-card">
                <div class="settings-item" onclick="editList('incomeCategories','Income Categories (one per line)')">
                    <span class="settings-label">Income Categories</span>
                    <span class="settings-value">${settings.incomeCategories.length} ›</span>
                </div>
                <div class="settings-item" onclick="editList('expenseCategories','Expense Categories (one per line)')">
                    <span class="settings-label">Expense Categories</span>
                    <span class="settings-value">${settings.expenseCategories.length} ›</span>
                </div>
            </div>

            <div class="settings-section-title">Data</div>
            <div class="settings-card">
                <div class="settings-item" onclick="loadData()">
                    <span class="settings-label">Refresh from Sheet</span>
                    <span class="settings-value">↻</span>
                </div>
            </div>
        </div>

        <button class="danger-btn" onclick="if(confirm('Sign out?'))signOut()">Sign Out</button>
    `);
}

function editSheetTab() {
    const v = prompt('Sheet tab name:', settings.sheetTab);
    if (v && v.trim()) { settings.sheetTab = v.trim(); saveSettings(); showToast('Saved. Refreshing…'); loadData(); }
}
function editList(key, label) {
    const v = prompt(label, settings[key].join('\n'));
    if (v !== null) {
        settings[key] = v.split('\n').map(s=>s.trim()).filter(Boolean);
        saveSettings(); showToast('Updated');
        renderSettings();
    }
}

// ─── TOAST ────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── SERVICE WORKER ───────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
