<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1E40AF">
    <title>Finance Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #1E40AF;
            --primary-light: #3B82F6;
            --income: #10B981;
            --expense: #EF4444;
            --transfer: #8B5CF6;
            --bg: #F1F5F9;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --nav-height: 65px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── SETUP SCREEN ── */
        #setup-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100dvh; padding: 32px 24px;
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            color: white;
        }
        .setup-logo  { font-size: 56px; margin-bottom: 16px; }
        .setup-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .setup-sub   { font-size: 14px; opacity: 0.85; margin-bottom: 32px; text-align: center; line-height: 1.6; }
        .setup-input {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: none;
            font-size: 13px; margin-bottom: 12px; outline: none; color: var(--text);
        }
        .setup-btn {
            width: 100%; padding: 15px; background: white; color: var(--primary);
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; margin-bottom: 16px;
        }
        .setup-help { font-size: 12px; opacity: 0.75; text-align: center; line-height: 1.6; }

        /* ── APP SHELL ── */
        #app { display: none; flex-direction: column; height: 100dvh; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            color: white; padding: 14px 20px 16px; flex-shrink: 0;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-subtitle { font-size: 12px; opacity: 0.75; margin-top: 2px; }
        .avatar-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.2); border: none;
            color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── MONTH SELECTOR ── */
        .month-selector {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 10px 20px;
            background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .month-btn {
            background: none; border: none; font-size: 22px;
            cursor: pointer; color: var(--primary); padding: 4px 10px; border-radius: 8px;
        }
        .month-btn:active { background: #EFF6FF; }
        .month-label { font-size: 15px; font-weight: 700; min-width: 130px; text-align: center; }

        /* ── CONTENT ── */
        .content { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-height) + 8px); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 3px; background: none; border: none; cursor: pointer;
            padding: 6px 16px; color: var(--text-secondary);
            font-size: 10px; font-weight: 500; flex: 1;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
        .nav-add {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--primary); border: none; color: white;
            font-size: 30px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(30,64,175,0.45);
            margin-top: -22px; flex-shrink: 0;
        }
        .nav-add:active { opacity: 0.85; }

        /* ── CARDS ── */
        .card {
            background: var(--card); border-radius: 16px;
            padding: 16px; margin: 12px 16px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        /* ── NET CARD ── */
        .net-card {
            margin: 12px 16px 0;
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            border-radius: 16px; padding: 18px; color: white;
        }
        .net-label  { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .net-amount { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }
        .net-sub    { font-size: 12px; opacity: 0.7; margin-top: 4px; }

        /* ── SUMMARY GRID ── */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 16px 0; }
        .summary-card { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .summary-icon   { font-size: 22px; margin-bottom: 8px; }
        .summary-label  { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .summary-amount { font-size: 19px; font-weight: 800; }
        .summary-amount.income  { color: var(--income); }
        .summary-amount.expense { color: var(--expense); }

        /* ── TRANSACTION ITEM ── */
        .transaction-item {
            display: flex; align-items: center;
            padding: 11px 0; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .transaction-item:last-child { border-bottom: none; }
        .tx-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .tx-icon.income  { background: #D1FAE5; }
        .tx-icon.expense { background: #FEE2E2; }
        .tx-icon.transfer{ background: #EDE9FE; }
        .tx-info { flex: 1; min-width: 0; }
        .tx-category { font-size: 14px; font-weight: 600; }
        .tx-meta  { font-size: 11px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tx-right { text-align: right; flex-shrink: 0; }
        .tx-amount { font-size: 14px; font-weight: 700; }
        .tx-amount.income   { color: var(--income); }
        .tx-amount.expense  { color: var(--expense); }
        .tx-amount.transfer { color: var(--transfer); }
        .tx-date { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        /* ── CHART ── */
        .chart-container { position: relative; height: 190px; margin: 4px 0 8px; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
        .legend-left { display: flex; align-items: center; gap: 8px; }
        .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .legend-name   { font-size: 13px; }
        .legend-amount { font-size: 13px; font-weight: 700; color: var(--expense); }

        /* ── ACCOUNT ITEM ── */
        .account-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .account-item:last-child { border-bottom: none; }
        .account-name    { font-size: 14px; font-weight: 600; }
        .account-balance { font-size: 16px; font-weight: 800; }
        .acct-group-hdr {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; margin-top: 8px;
            border-bottom: 1px solid var(--border);
        }
        .acct-group-hdr:first-child { margin-top: 0; }

        /* ── FORM ── */
        .form-section { padding: 16px; }
        .form-group   { margin-bottom: 15px; }
        .form-label   { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; display: block; }
        .form-input, .form-select {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 15px; color: var(--text); background: var(--card);
            outline: none; transition: border-color 0.2s;
            -webkit-appearance: none; appearance: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary-light); }
        .form-select-wrap { position: relative; }
        .form-select-wrap::after {
            content: '›'; position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%) rotate(90deg);
            color: var(--text-secondary); font-size: 18px; pointer-events: none;
        }

        /* ── TYPE SELECTOR ── */
        .type-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .type-btn {
            padding: 10px 4px; border: 1.5px solid var(--border);
            border-radius: 10px; background: none; font-size: 11px;
            font-weight: 700; cursor: pointer; text-align: center; color: var(--text-secondary);
        }
        .type-btn.active-expense  { border-color: var(--expense);  background: #FEE2E2; color: var(--expense);  }
        .type-btn.active-income   { border-color: var(--income);   background: #D1FAE5; color: var(--income);   }
        .type-btn.active-transfer { border-color: var(--transfer); background: #EDE9FE; color: var(--transfer); }

        /* ── AUTOCOMPLETE ── */
        .ac-wrap { position: relative; }
        .ac-dropdown {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--card); border: 1.5px solid var(--primary-light);
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.12);
            z-index: 500; max-height: 180px; overflow-y: auto; display: none;
        }
        .ac-dropdown.open { display: block; }
        .ac-item {
            padding: 11px 16px; font-size: 14px; color: var(--text);
            cursor: pointer; border-bottom: 1px solid var(--border);
        }
        .ac-item:last-child { border-bottom: none; }
        .ac-item:active, .ac-item:hover { background: #EFF6FF; }

        /* ── SUBMIT ── */
        .submit-btn {
            width: 100%; padding: 16px; background: var(--primary);
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:active   { opacity: 0.88; }
        .submit-btn:disabled { opacity: 0.6;  }

        /* ── RECORDS ── */
        .records-filter { padding: 0 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .records-filter::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
            background: none; font-size: 13px; font-weight: 500; cursor: pointer;
            white-space: nowrap; color: var(--text-secondary);
        }
        .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
        .search-box { margin: 0 16px 10px; position: relative; }
        .search-input {
            width: 100%; padding: 10px 16px 10px 38px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 14px; background: var(--card); outline: none;
        }
        .search-input:focus { border-color: var(--primary-light); }
        .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; }

        /* ── SETTINGS ── */
        .settings-section       { margin: 0 16px 16px; }
        .settings-section-title { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; padding: 16px 0 8px; }
        .settings-card   { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .settings-item   { display: flex; justify-content: space-between; align-items: center; padding: 15px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .settings-item:last-child { border-bottom: none; }
        .settings-label  { font-size: 15px; font-weight: 500; }
        .settings-value  { font-size: 14px; color: var(--text-secondary); }

        /* ── MISC ── */
        .view-header { padding: 16px 16px 4px; font-size: 22px; font-weight: 800; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-icon  { font-size: 44px; margin-bottom: 10px; }
        .danger-btn  {
            width: calc(100% - 32px); margin: 8px 16px 24px;
            padding: 14px; background: #FEE2E2; color: var(--expense);
            border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .see-all-btn {
            width: 100%; padding: 10px; background: none; border: none;
            color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: calc(var(--nav-height) + 12px);
            left: 16px; right: 16px; padding: 13px 20px;
            background: #1E293B; color: white; border-radius: 12px;
            font-size: 14px; font-weight: 500; z-index: 500; text-align: center;
            transform: translateY(120px); transition: transform 0.28s ease;
        }
        .toast.show { transform: translateY(0); }

        /* ── SPINNER ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite; display: inline-block;
        }
    </style>
</head>
<body>

<!-- ═══════════════════════ SETUP SCREEN ═══ -->
<div id="setup-screen">
    <div class="setup-logo">💰</div>
    <div class="setup-title">Finance Tracker</div>
    <div class="setup-sub">Paste your Google Apps Script URL below to connect to your sheet.</div>
    <input class="setup-input" id="script-url-input" type="url"
           placeholder="https://script.google.com/macros/s/...">
    <button class="setup-btn" onclick="saveScriptUrl()">Connect to Google Sheet</button>
    <div class="setup-help">
        Open your Google Sheet → Extensions → Apps Script<br>
        → Deploy → New deployment → Web app → Copy URL
    </div>
</div>

<!-- ═══════════════════════ APP ═══════════ -->
<div id="app">
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title" id="header-title">Dashboard</div>
                <div class="header-subtitle">Finance Tracker</div>
            </div>
            <button class="avatar-btn" onclick="navigate('settings')">⚙️</button>
        </div>
    </div>

    <div class="month-selector" id="month-selector">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="content" id="content"></div>

    <nav class="bottom-nav">
        <button class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
            <span class="nav-icon">🏠</span><span>Home</span>
        </button>
        <button class="nav-item" id="nav-records" onclick="navigate('records')">
            <span class="nav-icon">📋</span><span>Records</span>
        </button>
        <button class="nav-add" onclick="form=resetForm();navigate('add')">+</button>
        <button class="nav-item" id="nav-accounts" onclick="navigate('accounts')">
            <span class="nav-icon">🏦</span><span>Accounts</span>
        </button>
        <button class="nav-item" id="nav-settings" onclick="navigate('settings')">
            <span class="nav-icon">☰</span><span>Settings</span>
        </button>
    </nav>
</div>

<div class="toast" id="toast"></div>

<!-- ═══════════ CATEGORY MANAGER MODAL ═══════════ -->
<div id="cat-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;" onclick="if(event.target===this)closeCatModal()">
    <div id="cat-sheet" style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80dvh;display:flex;flex-direction:column;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px 12px;">
            <span id="cat-title" style="font-size:16px;font-weight:700;color:#1E293B;"></span>
            <button onclick="closeCatModal()" style="background:none;border:none;font-size:22px;color:#64748B;cursor:pointer;line-height:1;">✕</button>
        </div>
        <!-- Add row -->
        <div style="padding:0 16px 12px;display:flex;gap:8px;">
            <input id="cat-new-input" type="text" placeholder="New category name…"
                style="flex:1;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;"
                onkeydown="if(event.key==='Enter')addCatItem()" />
            <button onclick="addCatItem()"
                style="padding:10px 18px;background:#1E40AF;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">Add</button>
        </div>
        <!-- List -->
        <div id="cat-list" style="overflow-y:auto;padding:0 16px 24px;flex:1;"></div>
    </div>
</div>

<!-- ═══════════════════════ SCRIPT ════════ -->
<script>
// ─── CONFIG ──────────────────────────────────────────
const MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CHART_COLORS= ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#14B8A6'];

let SCRIPT_URL = '';

// ─── STATE ───────────────────────────────────────────
let allData       = [];
let currentView   = 'dashboard';
let selectedMonth = new Date();
let categoryChart = null;
let recordsFilter  = 'all';
let recordsSearch  = '';
let recordsAccount = '';
let dashBalances   = null;
let accountsFilter = 'all';

const ACCT_GROUPS_MAP = {
    bankswallets: new Set(['PS Bank','BPI','GCASH','Paymaya','MariBank','Maya Tintak','Shopee Wallet','Lazada Wallet','CASH']),
    credit:       new Set(['BPI-CC','BPI-CC BETH (270k)']),
    savings:      new Set(['Maya Savings','Maya Savings (Tax Fund)','Maya Savings (Products)','GSave'])
};
function acctGroup(name) {
    if (ACCT_GROUPS_MAP.bankswallets.has(name)) return 'bankswallets';
    if (ACCT_GROUPS_MAP.credit.has(name))       return 'credit';
    if (ACCT_GROUPS_MAP.savings.has(name))      return 'savings';
    return 'other';
}

let settings = loadSettings();
function loadSettings() {
    try {
        const s = JSON.parse(localStorage.getItem('ft_settings')) || defaultSettings();
        // Normalize: ensure category/account arrays contain only plain strings (fix corrupt state)
        ['accounts','incomeCategories','expenseCategories'].forEach(key => {
            if (!Array.isArray(s[key])) s[key] = defaultSettings()[key];
            s[key] = s[key].flatMap(v => String(v).split('\n').map(x=>x.trim())).filter(Boolean);
        });
        return s;
    }
    catch(e) { return defaultSettings(); }
}
function defaultSettings() {
    return {
        sheetTab: 'Moneyger',
        accounts: ['BPI','MariBank','GCASH','CASH','Paymaya','PS Bank'],
        incomeCategories:  ['Custom Temporary Tattoos','Shopee Sales','Website Sales','Other Income'],
        expenseCategories: ['Labor','Utilities','Mark Expenses','Office Supplies','Advertising (FB Ads)','Dine out','Website and Technologies','Miscellaneous']
    };
}
function saveSettings() { localStorage.setItem('ft_settings', JSON.stringify(settings)); }

// Fetch pre-computed balances from DASHBOARD and use them in the Accounts view.
function loadBalances() {
    if (!SCRIPT_URL) return;
    dashBalances = null;
    fetch(SCRIPT_URL + '?action=getBalances')
        .then(r => r.json())
        .then(data => {
            if (data.balances) {
                dashBalances = data.balances;
                if (currentView === 'accounts') renderAccounts();
            }
        })
        .catch(() => {});
}

// Fetch canonical account list from GAS and update local settings.
// Called on startup and after URL change so accounts survive cache clears.
function syncAccountsFromGAS() {
    if (!SCRIPT_URL) return;
    fetch(SCRIPT_URL + '?action=getAccounts')
        .then(r => r.json())
        .then(data => {
            if (data.accounts && Array.isArray(data.accounts) && data.accounts.length) {
                settings.accounts = data.accounts;
                saveSettings();
            }
        })
        .catch(() => {}); // silently keep existing list on failure
}

let form = resetForm();
function resetForm(keepAccount) {
    return { date: todayInput(), type: 'Exp.', account: keepAccount || '', category: '', note: '', amount: '', transferAccount: '', description: '' };
}

// ─── INIT ────────────────────────────────────────────
window.addEventListener('load', () => {
    updateMonthLabel();
    const savedUrl = localStorage.getItem('ft_script_url');
    if (savedUrl) {
        SCRIPT_URL = savedUrl;
        showApp();
        loadData();
        loadBalances();
        syncAccountsFromGAS();
    } else {
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function saveScriptUrl() {
    const url = document.getElementById('script-url-input').value.trim();
    if (!url.startsWith('https://script.google.com')) {
        showToast('Please paste a valid Apps Script URL');
        return;
    }
    localStorage.setItem('ft_script_url', url);
    SCRIPT_URL = url;
    showApp();
    loadData();
    loadBalances();
    syncAccountsFromGAS();
}

function showApp() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    navigate('dashboard');
}

// ─── API ─────────────────────────────────────────────
async function apiGet() {
    const url = SCRIPT_URL + '?t=' + Date.now();
    const r = await fetch(url, { redirect: 'follow' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
}

async function apiUpdate(rowNum, row) {
    const url = SCRIPT_URL
        + '?action=update'
        + '&row=' + rowNum
        + '&data=' + encodeURIComponent(JSON.stringify({ row }))
        + '&t=' + Date.now();
    const r = await fetch(url, { redirect: 'follow' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.success) throw new Error('Update did not confirm');
    return data;
}

async function apiDelete(rowNum) {
    const url = SCRIPT_URL
        + '?action=delete'
        + '&row=' + rowNum
        + '&t=' + Date.now();
    const r = await fetch(url, { redirect: 'follow' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.success) throw new Error('Delete did not confirm');
    return data;
}

async function deleteTx(rowNum) {
    if (!confirm('Delete this transaction? This cannot be undone.')) return;
    try {
        const tx = allData.find(r => r._row === rowNum);
        const pairRow = tx?._pairRow || null;
        if (pairRow) {
            // Delete higher row first so lower row number stays valid
            const hi = Math.max(rowNum, pairRow);
            const lo = Math.min(rowNum, pairRow);
            await apiDelete(hi);
            await apiDelete(lo);
            allData = allData.filter(r => r._row !== rowNum && r._row !== pairRow);
        } else {
            await apiDelete(rowNum);
            allData = allData.filter(r => r._row !== rowNum);
        }
        showToast('🗑 Deleted');
        form = resetForm();
        navigate('records');
    } catch(e) {
        showToast('❌ ' + e.message);
    }
}

async function apiAppend(row) {
    // Use GET with URL params — avoids POST→GET redirect issue with GAS exec URL
    const url = SCRIPT_URL
        + '?action=append'
        + '&data=' + encodeURIComponent(JSON.stringify({ row }))
        + '&t=' + Date.now();
    const r = await fetch(url, { redirect: 'follow' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.success) throw new Error('Sheet write did not confirm — check script URL');
    return data;
}

async function apiAppendTransfer(outRow, inRow) {
    // Sends both rows in one GAS call — single write lock, single recalculation
    const url = SCRIPT_URL
        + '?action=appendTransfer'
        + '&data=' + encodeURIComponent(JSON.stringify([outRow, inRow]))
        + '&t=' + Date.now();
    const r = await fetch(url, { redirect: 'follow' });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.success) throw new Error('Transfer write failed — check script URL');
    return data;
}

async function loadData() {
    showContent('<div style="padding:60px;text-align:center;color:var(--text-secondary)">Loading…</div>');
    try {
        const data = await apiGet();
        allData = (data.values || []).map((r, i) => {
            const type = String(r[5] || '');
            const isTransfer = type === 'Transfer-In' || type === 'Transfer-Out';
            return {
                _row:            i + 2,   // sheet row number (row 1 = header)
                period:          String(r[0] || ''),
                account:         String(r[1] || ''),
                category:        isTransfer ? '' : String(r[2] || ''),
                note:            String(r[3] || ''),
                amount:          parseFloat(r[4]) || 0,
                type:            type,
                transferAccount: isTransfer ? String(r[2] || '') : '',
                description:     String(r[8] || '')
            };
        });
        // Pair Transfer-Out and Transfer-In rows so we show one entry per transfer
        const xferIn = allData.filter(r => r.type === 'Transfer-In');
        allData.filter(r => r.type === 'Transfer-Out').forEach(out => {
            out._isPrimary = true;
            const match = xferIn.find(inn =>
                !inn._paired &&
                inn.period === out.period &&
                inn.amount === out.amount &&
                inn.account === out.transferAccount &&
                inn.transferAccount === out.account
            );
            if (match) { out._pairRow = match._row; match._paired = true; }
        });
        renderCurrentView();
    } catch(e) {
        showContent(`<div class="empty-state"><div class="empty-icon">⚠️</div><div>${e.message}</div><br><button onclick="loadData()" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button></div>`);
    }
}

// ─── DATE HELPERS ─────────────────────────────────────
function parseSheetDate(str) {
    if (!str) return null;
    // "DD-MMM-YY" or "DD-MMM-YYYY" format (what the app writes)
    const p = str.split('-');
    if (p.length === 3 && isNaN(Number(p[1]))) {
        const mMap = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
        const d = parseInt(p[0]), m = mMap[p[1]];
        const y = p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]);
        if (!isNaN(d) && m !== undefined && !isNaN(y)) return new Date(y, m, d);
    }
    // ISO / serial date strings from GAS (date-type cells serialised by JSON.stringify)
    const dt = new Date(str);
    if (!isNaN(dt.getTime())) return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
    return null;
}
function sheetDateToInput(period) {
    const d = parseSheetDate(period);
    if (!d) return todayInput();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function editTx(rowNum) {
    const tx = allData.find(r => r._row === rowNum);
    if (!tx) return;
    form = {
        _editRow:        rowNum,
        _pairRow:        tx._pairRow || null,
        date:            sheetDateToInput(tx.period),
        type:            tx.type === 'Transfer-Out' ? 'Transfer' : tx.type,
        account:         tx.account,
        category:        tx.category,
        note:            tx.note,
        amount:          String(tx.amount),
        transferAccount: tx.transferAccount,
        description:     tx.description
    };
    navigate('add');
}
function toSheetDate(val) {
    const d = new Date(val + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}-${MONTHS[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}
function todayInput() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── DATA HELPERS ─────────────────────────────────────
function monthRows() {
    return allData.filter(r => {
        const d = parseSheetDate(r.period);
        return d && d.getMonth() === selectedMonth.getMonth() && d.getFullYear() === selectedMonth.getFullYear();
    }).sort((a, b) => {
        const da = parseSheetDate(a.period), db = parseSheetDate(b.period);
        return db - da; // newest first
    });
}
function monthStats() {
    const rows = monthRows();
    let income = 0, expense = 0;
    rows.forEach(r => {
        if (r.type === 'Income') income += r.amount;
        else if (r.type === 'Exp.') expense += r.amount;
    });
    return { income, expense, net: income - expense, rows };
}
function accountBalances() {
    // Prefer DASHBOARD balances (Option A) — matches sheet exactly
    if (dashBalances) {
        const bal = {};
        settings.accounts.forEach(a => bal[a] = dashBalances.hasOwnProperty(a) ? Number(dashBalances[a]) : 0);
        return bal;
    }
    // Fallback: compute from Moneyger data only (no opening balance / pre-Moneyger history)
    const bal = {};
    settings.accounts.forEach(a => bal[a] = 0);
    allData.forEach(r => {
        if (!r.account) return;
        if (!bal.hasOwnProperty(r.account)) return; // skip renamed/unknown accounts
        if (r.type === 'Income'          || r.type === 'Transfer-In')    bal[r.account] += r.amount;
        if (r.type === 'Exp.'            || r.type === 'Transfer-Out')   bal[r.account] -= r.amount;
        if (r.type === 'Opening Balance')                                 bal[r.account] += r.amount;
    });
    return bal;
}
// Returns last 12 calendar months (oldest→newest) with income, expense, net per month
function last12Stats() {
    const now = new Date();
    const months = [];
    for (let i = 11; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        months.push({ year: d.getFullYear(), month: d.getMonth(), income: 0, expense: 0 });
    }
    allData.forEach(r => {
        const d = parseSheetDate(r.period);
        if (!d) return;
        const slot = months.find(m => m.year === d.getFullYear() && m.month === d.getMonth());
        if (!slot) return;
        if (r.type === 'Income') slot.income += r.amount;
        else if (r.type === 'Exp.') slot.expense += r.amount;
    });
    return months.map(m => ({ ...m, net: m.income - m.expense }));
}
function liquidBalance() {
    if (!dashBalances) return null;
    let total = 0;
    Object.entries(dashBalances).forEach(([name, bal]) => {
        const g = acctGroup(name);
        if (g === 'bankswallets') total += Number(bal);
    });
    return total;
}
function categoryBreakdown() {
    const rows = monthRows();
    const bd = {};
    rows.forEach(r => { if (r.type === 'Exp.' && r.category) bd[r.category] = (bd[r.category]||0) + r.amount; });
    return Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,10);
}
function fmt(n) { return n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ─── NAVIGATION ───────────────────────────────────────
function navigate(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    const ids = { dashboard:'nav-dashboard', records:'nav-records', accounts:'nav-accounts', settings:'nav-settings' };
    if (ids[view]) document.getElementById(ids[view]).classList.add('active');
    const showMonth = view === 'dashboard' || view === 'records';
    document.getElementById('month-selector').style.display = showMonth ? 'flex' : 'none';
    const titles = { dashboard:'Dashboard', records:'Records', add:'Add Transaction', accounts:'Accounts', settings:'Settings' };
    document.getElementById('header-title').textContent = titles[view] || view;
    renderCurrentView();
}
function showContent(html) { document.getElementById('content').innerHTML = html; }
function renderCurrentView() {
    if      (currentView === 'dashboard') renderDashboard();
    else if (currentView === 'records')   renderRecords();
    else if (currentView === 'add')       renderAdd();
    else if (currentView === 'accounts')  renderAccounts();
    else if (currentView === 'settings')  renderSettings();
}

function txHTML(tx) {
    const isIncome   = tx.type === 'Income';
    const isTransfer = tx.type === 'Transfer-Out' || tx.type === 'Transfer-In';

    const icon = isIncome ? '💚' : isTransfer ? '🔄' : '🔴';
    const sign = isIncome ? '+' : isTransfer ? '' : '-';
    const label = tx.type === 'Transfer-Out' ? `${tx.account} → ${tx.transferAccount}`
                : tx.type === 'Transfer-In'  ? `${tx.transferAccount} → ${tx.account}`
                : (tx.category || tx.type);
    return `
        <div class="transaction-item" onclick="editTx(${tx._row})" style="cursor:pointer">
            <div class="tx-icon ${cls}">${icon}</div>
            <div class="tx-info">
                <div class="tx-category">${label}</div>
                <div class="tx-meta">${[tx.note, tx.description, ...(isTransfer ? [] : [tx.account])].filter(Boolean).join(' · ')}</div>

            <div class="tx-right">
                <div class="tx-amount ${cls}">${sign}₱${fmt(tx.amount)}</div>
                <div class="tx-date">${tx.period}</div>
            </div>
        </div>`;
}

    form.description     = document.getElementById('f-description')?.value || form.description;
    form.transferAccount = document.getElementById('f-transfer')?.value    || form.transferAccount;
    form.date            = document.getElementById('f-date')?.value        || form.date;
    form.type = t;
    form.category = '';
    renderAdd();
}

async function saveTransaction(btn) {
    const isTransfer = form.type === 'Transfer';

    // Read directly from DOM — more reliable on iOS
    const account         = (document.getElementById('f-account')?.value     || '').trim();
    const category        = (document.getElementById('f-category')?.value    || '').trim();
    const note            = (document.getElementById('f-note')?.value        || '').trim();
    const description     = (document.getElementById('f-description')?.value || '').trim();
    const amount          = (document.getElementById('f-amount')?.value      || '').trim();
    const transferAccount = (document.getElementById('f-transfer')?.value    || '').trim();
    const date            = document.getElementById('f-date')?.value || form.date;

    if (!account)                                              { showToast('Please select an account'); return; }
    if (!amount || parseFloat(amount) <= 0)                    { showToast('Please enter a valid amount'); return; }
    if (!isTransfer && !category)                              { showToast('Please select a category'); return; }
    if (isTransfer && !transferAccount)                        { showToast('Please select a To Account'); return; }
    if (isTransfer && account === transferAccount)             { showToast('From and To accounts must be different'); return; }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Saving…';

    const editRow = form._editRow;
    const pairRow = form._pairRow || null;
    const amt     = parseFloat(amount);
    const dateFmt = toSheetDate(date);

    try {
        if (isTransfer) {
            // Transfer-Out row: money leaves `account` going to `transferAccount`
            const outRow = [dateFmt, account, transferAccount, note, amt, 'Transfer-Out', '', '', description];
            // Transfer-In row: money arrives at `transferAccount` from `account`
            const inRow  = [dateFmt, transferAccount, account, note, amt, 'Transfer-In',  '', '', description];

            if (editRow) {
                await apiUpdate(editRow, outRow);
                if (pairRow) await apiUpdate(pairRow, inRow);
                const idx  = allData.findIndex(r => r._row === editRow);
                const pIdx = allData.findIndex(r => r._row === pairRow);
                if (idx  !== -1) allData[idx]  = { ...allData[idx],  period: dateFmt, account, transferAccount, note, amount: amt, type: 'Transfer-Out', category: '', description, _isPrimary: true, _pairRow: pairRow };
                if (pIdx !== -1) allData[pIdx] = { ...allData[pIdx], period: dateFmt, account: transferAccount, transferAccount: account, note, amount: amt, type: 'Transfer-In', category: '', description, _paired: true };
            } else {
                // Fire-and-forget — both rows sent in one GAS call, UI updates immediately
                apiAppendTransfer(outRow.slice(0, 6), inRow.slice(0, 6))
                    .catch(e => console.warn('Transfer append background:', e.message));
                const newOut = { _row: null, _isPrimary: true, _pairRow: null, period: dateFmt, account, transferAccount, note, amount: amt, type: 'Transfer-Out', category: '', description };
                const newIn  = { _row: null, _paired: true, period: dateFmt, account: transferAccount, transferAccount: account, note, amount: amt, type: 'Transfer-In', category: '', description };
                allData.push(newOut, newIn);
            }
        } else {
            const row = [dateFmt, account, category, note, amt, form.type, '', '', description];
            if (editRow) {
                await apiUpdate(editRow, row);
                const idx = allData.findIndex(r => r._row === editRow);
                if (idx !== -1) allData[idx] = { ...allData[idx], period: dateFmt, account, category, note, amount: amt, type: form.type, transferAccount: '', description };
            } else {
                apiAppend(row.slice(0, 6)).catch(e => console.warn('Append background:', e.message));
                allData.push({ _row: null, period: dateFmt, account, category, note, amount: amt, type: form.type, transferAccount: '', description });
            }
        }

        showToast(editRow ? '✅ Updated!' : '✅ Saved!');
        form = resetForm(account);
        navigate('records');
    } catch(e) {
        showToast('❌ ' + e.message);
        btn.disabled = false;
        btn.innerHTML = editRow ? '✏️ Update Transaction' : 'Save Transaction';
    }
}

// ─── ACCOUNTS ─────────────────────────────────────────
function renderAccounts() {
    const bal = accountBalances();
    const GROUP_META = [
        { key:'bankswallets', label:'🏦 Banks & Wallets', color:'#1565c0', bg:'#e3f2fd' },
        { key:'credit',       label:'💳 Credit Cards',    color:'#c62828', bg:'#fce4ec' },
        { key:'savings',      label:'💰 Savings',         color:'#2e7d32', bg:'#e8f5e9' },
    ];
    // Bucket accounts into groups, sorted by balance desc within each group
    const groups = { bankswallets:[], credit:[], savings:[] };
    Object.entries(bal).forEach(([acc, b]) => groups[acctGroup(acc)].push([acc, b]));
    Object.values(groups).forEach(g => g.sort((a,b) => b[1]-a[1]));

    const total = Object.values(bal).reduce((s,v) => s+v, 0);
    const filterKeys = ['all','bankswallets','credit','savings'];
    const filterLabels = ['All','Banks & Wallets','Credit','Savings'];
    const visibleGroups = accountsFilter === 'all'
        ? GROUP_META.filter(m => groups[m.key].length)
        : GROUP_META.filter(m => m.key === accountsFilter && groups[m.key].length);

    const groupHTML = visibleGroups.map(meta => {
        const items = groups[meta.key];
        const subtotal = items.reduce((s,[,v]) => s+v, 0);
        return `
            <div class="acct-group-hdr" style="border-left:4px solid ${meta.color};background:${meta.bg};margin:0 -16px;padding:8px 16px">
                <span style="color:${meta.color};font-weight:700;font-size:13px">${meta.label}</span>
                <span style="color:${meta.color};font-weight:700;font-size:13px">${subtotal<0?'-':''}₱${fmt(Math.abs(subtotal))}</span>
            </div>
            ${items.map(([acc,b]) => `
                <div class="account-item" onclick="recordsAccount='${acc}';navigate('records')" style="cursor:pointer">
                    <div class="account-name">${acc}</div>
                    <div class="account-balance" style="color:${b>=0?'var(--income)':'var(--expense)'}">
                        ${b<0?'-':''}₱${fmt(Math.abs(b))}
                    </div>
                </div>`).join('')}`;
    }).join('');

    showContent(`
        <div class="view-header">Account Balances</div>
        <div class="records-filter" style="padding:8px 16px 4px">
            ${filterKeys.map((f,i) => `
                <button class="filter-chip ${accountsFilter===f?'active':''}"
                    onclick="accountsFilter='${f}';renderAccounts()">${filterLabels[i]}</button>`).join('')}
        </div>
        <div class="card" style="margin-bottom:16px;overflow:hidden">
            ${groupHTML}
            ${accountsFilter==='all' ? `
            <div class="account-item" style="border-top:2px solid var(--border);margin-top:4px;padding-top:14px">
                <div class="account-name" style="font-size:15px">Total Net Worth</div>
                <div class="account-balance" style="font-size:18px;color:${total>=0?'var(--income)':'var(--expense)'}">
                    ${total<0?'-':''}₱${fmt(Math.abs(total))}
                </div>
            </div>` : ''}
        </div>`);
}

function changeScriptUrl() {
    const url = prompt('Paste new Apps Script URL:', SCRIPT_URL);
    if (url && url.startsWith('https://script.google.com')) {
        localStorage.setItem('ft_script_url', url);
        SCRIPT_URL = url;
        showToast('Updated! Reloading…');
        loadData();

// ─── CATEGORY MANAGER MODAL ───────────────────────────
let _catKey = '';
function editList(key, label) {
    _catKey = key;
    document.getElementById('cat-title').textContent = label;
    document.getElementById('cat-new-input').value = '';
    renderCatList();
    const ov = document.getElementById('cat-overlay');
    ov.style.display = 'flex';
    setTimeout(() => document.getElementById('cat-new-input').focus(), 80);
}
function closeCatModal() {
    document.getElementById('cat-overlay').style.display = 'none';
    renderSettings();
}
function renderCatList() {
    const items = settings[_catKey];
    const el = document.getElementById('cat-list');
    if (!items.length) { el.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:16px;font-size:14px;">No categories yet.</p>'; return; }
    el.innerHTML = items.map((c,i) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid #F1F5F9;">
            <span style="font-size:14px;color:#1E293B;">${c}</span>
            <button onclick="removeCatItem(${i})"
                style="background:none;border:none;color:#EF4444;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;">🗑</button>
        </div>`).join('');
}
function addCatItem() {
    const inp = document.getElementById('cat-new-input');
    const val = inp.value.trim();
    if (!val) return;
    if (settings[_catKey].includes(val)) { showToast('Already exists'); return; }
    settings[_catKey].push(val);
    saveSettings();
    inp.value = '';
    renderCatList();
    showToast('Added');
}
function removeCatItem(idx) {
    settings[_catKey].splice(idx, 1);
    saveSettings();
    renderCatList();
    showToast('Removed');
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────
function acShow(inputId, dropId, field) {
    const input = document.getElementById(inputId);
    const drop  = document.getElementById(dropId);
    if (!input || !drop) return;
    const q = input.value.trim().toLowerCase();
    if (!q) { acHide(dropId); return; }

    // Collect unique values from allData for this field, matching the query
    const seen = new Set();
    const matches = [];
    for (const r of allData) {
        const val = (r[field] || '').trim();
        if (val && val.toLowerCase().includes(q) && !seen.has(val)) {
            seen.add(val);
            matches.push(val);
            if (matches.length >= 6) break;
        }
    }

    if (!matches.length) { acHide(dropId); return; }

    drop.innerHTML = matches.map(m => `<div class="ac-item">${m}</div>`).join('');
    drop.querySelectorAll('.ac-item').forEach((el, i) => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            acPick(inputId, dropId, matches[i]);
        });
    });
    drop.classList.add('open');
}
function acHide(dropId) {
    const drop = document.getElementById(dropId);
    if (drop) drop.classList.remove('open');
}
function acPick(inputId, dropId, value) {
    const input = document.getElementById(inputId);
    if (input) { input.value = value; input.focus(); }
    acHide(dropId);
}

// Close all autocomplete dropdowns when tapping outside an ac-wrap
document.addEventListener('click', function(e) {
    if (!e.target.closest('.ac-wrap')) {
        document.querySelectorAll('.ac-dropdown.open').forEach(d => d.classList.remove('open'));
    }
});

// ─── TOAST ────────────────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}
